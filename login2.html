<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Page</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }

        /* Custom style for the subtle shadow on input focus */
        .input-focus-shadow:focus {
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.5); /* blue-500 with opacity */
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-md bg-white rounded-xl shadow-2xl p-8 space-y-8">
        <div class="text-center">
            <h1 class="text-3xl font-extrabold text-gray-900">Create an Account</h1>
            <p class="mt-2 text-gray-600">Please select your role to create your account.</p>
        </div>

        <!-- Message Box for Feedback -->
        <div id="message-box" class="hidden p-3 rounded-lg text-sm font-medium transition-opacity duration-300" role="alert">
            <!-- Messages will be injected here -->
        </div>

        <!-- Role Tabs -->
        <div class="flex space-x-4 p-1 bg-gray-100 rounded-lg">
            <button id="student-tab"
                class="flex-1 py-3 px-6 text-sm font-semibold rounded-lg text-white bg-blue-600 shadow-md transition-all duration-300 transform hover:scale-[1.01]">
                Student
            </button>
            <button id="teacher-tab"
                class="flex-1 py-3 px-6 text-sm font-semibold rounded-lg text-gray-600 bg-transparent hover:bg-white transition-all duration-300">
                Teacher
            </button>
        </div>

        <!-- Student Form -->
        <div id="student-form" class="space-y-6">
            <h2 class="text-xl font-bold text-gray-800 text-center">Student Sign Up</h2>
            <div>
                <label for="student-name" class="block text-sm font-medium text-gray-700">Full Name</label>
                <input type="text" id="student-name"
                    class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 input-focus-shadow"
                    placeholder="Enter your full name" required>
            </div>
            <div>
                <label for="student-phone" class="block text-sm font-medium text-gray-700">Phone Number</label>
                <input type="tel" id="student-phone"
                    class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 input-focus-shadow"
                    placeholder="e.g., 555-123-4567" required>
            </div>
            <div>
                <label for="student-dob" class="block text-sm font-medium text-gray-700">Date of Birth</label>
                <input type="date" id="student-dob"
                    class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 input-focus-shadow"
                    required>
            </div>
            <div>
                <label for="student-password" class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="student-password"
                    class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 input-focus-shadow"
                    placeholder="Create a strong password" required>
            </div>
            
            <button id="student-signup-btn" onclick="handleSignUp('student') ;window.location.href='home3.html'"
                class="w-full py-3 px-4 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 transition-colors duration-200 focus:outline-none focus:ring-4 focus:ring-blue-500/50 shadow-lg shadow-blue-500/50 transform active:scale-[0.98]">
                Sign Up as Student
            </button>
        </div>

        <!-- Teacher Form -->
        <div id="teacher-form" class="space-y-6 hidden">
            <h2 class="text-xl font-bold text-gray-800 text-center">Teacher Sign Up</h2>
            <div>
                <label for="teacher-name" class="block text-sm font-medium text-gray-700">Full Name</label>
                <input type="text" id="teacher-name"
                    class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 input-focus-shadow"
                    placeholder="Enter your full name" required>
            </div>
            <div>
                <label for="teacher-email" class="block text-sm font-medium text-gray-700">Work Email</label>
                <input type="email" id="teacher-email"
                    class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 input-focus-shadow"
                    placeholder="e.g., name@school.edu" required>
            </div>
            <div>
                <label for="teacher-phone" class="block text-sm font-medium text-gray-700">Phone Number</label>
                <input type="tel" id="teacher-phone"
                    class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 input-focus-shadow"
                    placeholder="e.g., 555-123-4567" required>
            </div>
            <div>
                <label for="teacher-password" class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="teacher-password"
                    class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 input-focus-shadow"
                    placeholder="Create a strong password" required>
            </div>
            
            <button id="teacher-signup-btn" onclick="handleSignUp('teacher');window.location.href='home3.html'"
                class="w-full py-3 px-4 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 transition-colors duration-200 focus:outline-none focus:ring-4 focus:ring-blue-500/50 shadow-lg shadow-blue-500/50 transform active:scale-[0.98]">
                Sign Up as Teacher
            </button>
        </div>

        <!-- OR Divider -->
        <div class="relative py-4">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-gray-300"></div>
            </div>
            <div class="relative flex justify-center text-sm">
                <span class="px-2 bg-white text-gray-500 font-medium">Or continue with</span>
            </div>
        </div>

        <!-- Social Sign Up -->
        <div class="space-y-4">
            <button onclick="showSocialMessage('Google')"
                class="w-full flex items-center justify-center gap-3 px-4 py-3 border border-gray-300 rounded-lg shadow-sm text-sm font-semibold text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors duration-200 transform active:scale-[0.99]">
                <!-- Google Icon SVG -->
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.8-.06-1.55-.18-2.26H12v4.34h5.88c-.26 1.34-1.03 2.5-2.22 3.28v2.85h3.66c2.15-2 3.38-4.93 3.38-8.21z" fill="#4285F4"></path>
                    <path d="M12 23c3.31 0 6.09-1.08 8.11-2.92l-3.66-2.85c-.94.63-2.15 1-3.26 1-2.52 0-4.66-1.7-5.42-3.99H2.9v2.96A11.97 11.97 0 0012 23z" fill="#34A853"></path>
                    <path d="M6.58 13.99c-.19-.57-.3-1.19-.3-1.84s.11-1.27.3-1.84V8.35H2.9A11.97 11.97 0 000 12c0 1.9.46 3.66 1.25 5.24l3.75-2.85c-.4-.54-.64-1.22-.67-1.95z" fill="#FBBC05"></path>
                    <path d="M12 5.06c1.82 0 3.42.74 4.67 1.83l3.26-3.15C18.09 1.77 15.31.64 12 .64A11.97 11.97 0 002.9 8.35l3.68 2.84C7.34 8.76 9.48 7.06 12 7.06z" fill="#EA4335"></path>
                </svg>
                <span>Continue with Google</span>
            </button>

            <button onclick="showSocialMessage('Microsoft')"
                class="w-full flex items-center justify-center gap-3 px-4 py-3 border border-gray-300 rounded-lg shadow-sm text-sm font-semibold text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors duration-200 transform active:scale-[0.99]">
                <!-- Microsoft Icon SVG (simple square design) -->
                <svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <rect x="1" y="1" width="10" height="10" fill="#F25022"/>
                    <rect x="13" y="1" width="10" height="10" fill="#7FBA00"/>
                    <rect x="1" y="13" width="10" height="10" fill="#00A4EF"/>
                    <rect x="13" y="13" width="10" height="10" fill="#FFB900"/>
                </svg>
                <span>Continue with Microsoft</span>
            </button>
        </div>

        <p class="mt-6 text-center text-sm text-gray-500">
            Already have an account? <a href="#" class="font-semibold text-blue-600 hover:text-blue-500" onclick="showLoginPrompt()">Log in</a>
        </p>

    </div>

    <!-- JS to handle form toggling and submission -->
    <script>
        const studentTab = document.getElementById('student-tab');
        const teacherTab = document.getElementById('teacher-tab');
        const studentForm = document.getElementById('student-form');
        const teacherForm = document.getElementById('teacher-form');
        const messageBox = document.getElementById('message-box');
        const studentBtn = document.getElementById('student-signup-btn');
        const teacherBtn = document.getElementById('teacher-signup-btn');

        // --- Tab Switching Logic ---
        function setTabActive(activeTab, inactiveTab, activeForm, inactiveForm) {
            // Update forms
            activeForm.classList.remove('hidden');
            inactiveForm.classList.add('hidden');

            // Update active tab button style
            activeTab.classList.add('bg-blue-600', 'text-white', 'shadow-md', 'transform', 'hover:scale-[1.01]');
            activeTab.classList.remove('bg-transparent', 'text-gray-600', 'hover:bg-white', 'shadow-none', 'transform', 'hover:scale-[1.05]');

            // Update inactive tab button style
            inactiveTab.classList.remove('bg-blue-600', 'text-white', 'shadow-md', 'transform', 'hover:scale-[1.01]');
            inactiveTab.classList.add('bg-transparent', 'text-gray-600', 'hover:bg-white', 'shadow-none', 'transform', 'hover:scale-[1.05]');

            // Clear any previous messages
            messageBox.classList.add('hidden');
        }

        studentTab.addEventListener('click', () => {
            setTabActive(studentTab, teacherTab, studentForm, teacherForm);
        });

        teacherTab.addEventListener('click', () => {
            setTabActive(teacherTab, studentTab, teacherForm, studentForm);
        });

        // Initialize state (ensure student is active on load)
        setTabActive(studentTab, teacherTab, studentForm, teacherForm);


        // --- Message Display Functions ---
        function showMessage(type, message) {
            messageBox.textContent = message;
            messageBox.classList.remove('hidden', 'bg-red-100', 'text-red-700', 'bg-green-100', 'text-green-700');
            
            if (type === 'success') {
                messageBox.classList.add('bg-green-100', 'text-green-700');
            } else if (type === 'error') {
                messageBox.classList.add('bg-red-100', 'text-red-700');
            }
            
            // Auto hide message after 5 seconds
            setTimeout(() => {
                messageBox.classList.add('hidden');
            }, 5000);
        }

        function showSocialMessage(provider) {
             showMessage('error', `A real app would redirect you to sign in with ${provider}. Since this is a demo, we'll just stop here!`);
        }

        function showLoginPrompt() {
            showMessage('error', "The login page functionality is not implemented yet. Please proceed with sign up!");
        }


        // --- Form Submission Handler (Simulated) ---
        async function handleSignUp(role) {
            const btn = role === 'student' ? studentBtn : teacherBtn;
            const form = role === 'student' ? studentForm : teacherForm;

            // Simple validation check: Ensure all required fields are filled
            const requiredInputs = form.querySelectorAll('[required]');
            let isValid = true;
            requiredInputs.forEach(input => {
                if (!input.value.trim()) {
                    input.classList.add('border-red-500', 'ring-red-500/50');
                    isValid = false;
                } else {
                    input.classList.remove('border-red-500', 'ring-red-500/50');
                }
            });

            if (!isValid) {
                showMessage('error', 'Please fill out all required fields.');
                return;
            }

            // 1. Show Loading State
            const originalText = btn.textContent;
            btn.textContent = 'Processing...';
            btn.disabled = true;
            btn.classList.add('opacity-70', 'cursor-not-allowed');

            try {
                // 2. Simulate API Call latency (2 seconds)
                await new Promise(resolve => setTimeout(resolve, 2000));

                // 3. Simulated Success
                showMessage('success', `Success! Your ${role} account has been created. Welcome aboard!`);

            } catch (error) {
                // 4. Simulated Error
                showMessage('error', 'Sign up failed due to a simulated server error. Please try again.');
            } finally {
                // 5. Restore Button State
                btn.textContent = originalText;
                btn.disabled = false;
                btn.classList.remove('opacity-70', 'cursor-not-allowed');
            }
        }
    </script>
</body>

</html>
